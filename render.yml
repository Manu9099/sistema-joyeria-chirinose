databases:
  - name: joyeria-db
    databaseName: joyeria_chirinose
    user: joyeria_user
    plan: free

services:
  - type: web
    name: joyeria-backend
    runtime: java
    rootDir: inventario
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: joyeria-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: joyeria-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: joyeria-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000

  - type: web
    name: joyeria-frontend
    runtime: static
    rootDir: joyeria-frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: joyeria-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://joyeria-backend.onrender.com